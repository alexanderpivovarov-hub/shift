<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Shift — социальная сеть</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Inter', sans-serif;
    }
    body {
      background: #0f0f12;
      color: #e4e4e7;
      padding-bottom: 80px;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 16px;
    }
    /* карточки */
    .card, .post, .chat-item, .group-item, .contact-item, .message-bubble {
      background: #18181b;
      border-radius: 24px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .post {
      transition: transform 0.1s ease;
    }
    .post:active { transform: scale(0.99); }
    /* аватар */
    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
      background: #3f3f46;
    }
    .avatar-small {
      width: 36px;
      height: 36px;
    }
    .flex {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .between {
      justify-content: space-between;
    }
    .col {
      flex-direction: column;
      align-items: stretch;
    }
    .text-muted {
      color: #a1a1aa;
      font-size: 13px;
    }
    .text-bold {
      font-weight: 600;
    }
    button, .button {
      background: #3b82f6;
      border: none;
      padding: 10px 18px;
      border-radius: 40px;
      color: white;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
    }
    button:active { opacity: 0.8; }
    button.danger { background: #dc2626; }
    button.secondary { background: #27272a; color: #e4e4e7; }
    input, textarea, select {
      background: #27272a;
      border: 1px solid #3f3f46;
      border-radius: 20px;
      padding: 12px 16px;
      color: white;
      width: 100%;
      margin-bottom: 12px;
    }
    /* нижние вкладки */
    .bottom-tabs {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #18181b;
      backdrop-filter: blur(20px);
      display: flex;
      justify-content: space-around;
      padding: 12px 20px 24px;
      border-top: 1px solid #27272a;
      z-index: 100;
    }
    .tab-btn {
      background: transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: #a1a1aa;
      padding: 8px 16px;
    }
    .tab-btn.active {
      color: #3b82f6;
    }
    .tab-icon {
      font-size: 24px;
      position: relative;
    }
    .plus-overlay {
      position: absolute;
      bottom: -6px;
      right: -12px;
      background: #3b82f6;
      border-radius: 20px;
      font-size: 14px;
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    /* анимация лайка */
    .like-animation {
      animation: likePop 0.3s cubic-bezier(0.34, 1.2, 0.64, 1);
    }
    @keyframes likePop {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); color: #ef4444; }
      100% { transform: scale(1); }
    }
    /* сообщения чата */
    .messages-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 60vh;
      overflow-y: auto;
      padding: 8px 0;
    }
    .message-row {
      display: flex;
      justify-content: flex-start;
    }
    .message-row.own {
      justify-content: flex-end;
    }
    .message-bubble {
      max-width: 80%;
      margin-bottom: 0;
      background: #27272a;
    }
    .message-row.own .message-bubble {
      background: #3b82f6;
      color: white;
    }
    /* создание группы модалка */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    .modal-content {
      background: #18181b;
      border-radius: 32px;
      padding: 24px;
      width: 90%;
      max-width: 400px;
    }
    .hidden { display: none; }
  </style>
</head>
<body>
<div class="container" id="app">
  <!-- динамический контент -->
</div>
<div class="bottom-tabs" id="bottomTabs" style="display: none;">
  <button class="tab-btn" data-tab="feed"><span class="tab-icon">📰</span><span>Лента</span></button>
  <button class="tab-btn" data-tab="chats"><span class="tab-icon">💬</span><span>Чаты</span></button>
  <button class="tab-btn" data-tab="profile"><span class="tab-icon">👤</span><span>Профиль</span></button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  let token = localStorage.getItem('token');
  let socket = null;
  let currentUser = null;
  let currentTab = 'feed';
  let groupsList = [];
  let contactsList = [];
  let currentChat = null; // { type: 'user'|'group', id, name }

  // Helper API
  async function api(method, url, data, isFormData = false) {
    const headers = !isFormData ? { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` } : { 'Authorization': `Bearer ${token}` };
    const body = isFormData ? data : (data ? JSON.stringify(data) : undefined);
    const res = await fetch(url, { method, headers, body });
    return res.json();
  }

  function initSocket() {
    if (!token) return;
    socket = io({ auth: { token } });
    socket.on('private_message', (msg) => {
      if (currentTab === 'chats' && currentChat?.type === 'user' && currentChat.id === msg.from) {
        appendMessage(msg, false);
      }
      loadChatsList(); // обновить список последних сообщений
    });
    socket.on('group_message', (msg) => {
      if (currentTab === 'chats' && currentChat?.type === 'group' && currentChat.id === msg.groupId) {
        appendGroupMessage(msg);
      }
      loadChatsList();
    });
  }

  // ----- РЕНДЕР ЛЕНТЫ -----
  async function renderFeed() {
    const posts = await api('GET', '/api/feed');
    let html = `<div class="card"><button id="createPostBtn" class="button">➕ Новый пост</button></div>`;
    for (let p of posts) {
      const isLiked = p.likes.includes(currentUser?.id);
      html += `
        <div class="post" data-post-id="${p.id}">
          <div class="flex">
            <img class="avatar" src="${p.avatar || 'https://randomuser.me/api/portraits/lego/1.jpg'}" onerror="this.src='https://via.placeholder.com/48'">
            <div><b>${escapeHtml(p.name)}</b> <span class="text-muted">@${escapeHtml(p.username)}</span></div>
          </div>
          <p class="text-muted" style="margin-top:8px">${escapeHtml(p.text)}</p>
          ${p.media ? `<img src="${p.media}" style="max-width:100%; border-radius:20px; margin-top:12px;">` : ''}
          <div class="flex between" style="margin-top:12px">
            <button class="like-btn ${isLiked ? 'liked' : ''}" data-id="${p.id}">❤️ <span class="like-count">${p.likes.length}</span></button>
            <button class="comment-btn">💬 0</button>
          </div>
        </div>
      `;
    }
    document.getElementById('app').innerHTML = html;
    document.getElementById('createPostBtn')?.addEventListener('click', () => showCreatePostModal());
    // лайки с анимацией
    document.querySelectorAll('.like-btn').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const postId = btn.dataset.id;
        const res = await api('POST', `/api/posts/${postId}/like`);
        if (res.liked !== undefined) {
          const countSpan = btn.querySelector('.like-count');
          countSpan.innerText = res.likes;
          if (res.liked) {
            btn.classList.add('liked');
            btn.style.animation = 'none';
            btn.offsetHeight;
            btn.style.animation = 'likePop 0.3s ease';
          } else {
            btn.classList.remove('liked');
          }
        }
      });
    });
  }

  function showCreatePostModal() {
    const modalHtml = `
      <div class="modal" id="postModal">
        <div class="modal-content">
          <h3>Новый пост</h3>
          <textarea id="postText" rows="3" placeholder="Что нового?"></textarea>
          <input type="file" id="postMedia" accept="image/*">
          <div class="flex between" style="margin-top:12px">
            <button id="submitPostBtn">Опубликовать</button>
            <button id="closeModalBtn" class="secondary">Отмена</button>
          </div>
        </div>
      </div>
    `;
    document.body.insertAdjacentHTML('beforeend', modalHtml);
    document.getElementById('submitPostBtn').onclick = async () => {
      const text = document.getElementById('postText').value;
      const file = document.getElementById('postMedia').files[0];
      const fd = new FormData();
      fd.append('text', text);
      if (file) fd.append('media', file);
      await fetch('/api/posts', { method: 'POST', headers: { 'Authorization': `Bearer ${token}` }, body: fd });
      document.getElementById('postModal')?.remove();
      renderFeed();
    };
    document.getElementById('closeModalBtn').onclick = () => document.getElementById('postModal')?.remove();
  }

  // ----- ЧАТЫ И ГРУППЫ -----
  async function loadChatsList() {
    // личные диалоги
    const contacts = await api('GET', '/api/contacts');
    const groups = await api('GET', '/api/groups');
    contactsList = contacts;
    groupsList = groups;
    let html = `<div class="card flex between"><h3>Диалоги</h3><button id="newGroupBtn">➕ Создать группу</button></div>`;
    for (let c of contacts) {
      html += `<div class="chat-item flex between" data-type="user" data-id="${c.id}" data-name="${c.name}">
        <div class="flex"><img class="avatar avatar-small" src="${c.avatar || 'https://randomuser.me/api/portraits/lego/2.jpg'}"><div><b>${escapeHtml(c.name)}</b><div class="text-muted">@${escapeHtml(c.username)}</div></div></div>
        <span class="text-muted">✉️</span>
      </div>`;
    }
    html += `<div class="card" style="margin-top:16px"><h3>Группы</h3></div>`;
    for (let g of groups) {
      html += `<div class="chat-item flex between" data-type="group" data-id="${g.id}" data-name="${g.name}">
        <div class="flex"><div class="avatar avatar-small" style="background:#3b82f6; display:flex;align-items:center;justify-content:center">👥</div><div><b>${escapeHtml(g.name)}</b><div class="text-muted">${g.type}</div></div></div>
      </div>`;
    }
    document.getElementById('app').innerHTML = html;
    document.querySelectorAll('.chat-item').forEach(el => {
      el.addEventListener('click', () => {
        const type = el.dataset.type;
        const id = parseInt(el.dataset.id);
        const name = el.dataset.name;
        currentChat = { type, id, name };
        if (type === 'user') openPrivateChat(id, name);
        else openGroupChat(id, name);
      });
    });
    document.getElementById('newGroupBtn')?.addEventListener('click', () => showCreateGroupModal());
  }

  async function openPrivateChat(userId, name) {
    const messages = await api('GET', `/api/messages/${userId}`);
    let html = `<div class="flex between"><button id="backBtn">← Назад</button><h3>${escapeHtml(name)}</h3><div></div></div>
      <div class="messages-list" id="chatMessagesList">${renderMessages(messages, userId)}</div>
      <div class="flex" style="margin-top:12px"><input type="text" id="msgInput" placeholder="Сообщение..." style="flex:1"><button id="sendMsgBtn">📨</button></div>`;
    document.getElementById('app').innerHTML = html;
    document.getElementById('backBtn').onclick = () => loadChatsList();
    document.getElementById('sendMsgBtn').onclick = () => {
      const text = document.getElementById('msgInput').value;
      if (text.trim()) {
        socket.emit('private_message', { to: userId, text });
        document.getElementById('msgInput').value = '';
      }
    };
    socket.on('private_message', (msg) => {
      if (msg.from === userId) appendMessage(msg, true);
    });
  }

  function renderMessages(msgs, otherId) {
    let html = '';
    for (let m of msgs) {
      const isOwn = m.fromId === currentUser.id;
      html += `<div class="message-row ${isOwn ? 'own' : ''}"><div class="message-bubble">${escapeHtml(m.text)}<div class="text-muted" style="font-size:10px">${new Date(m.time).toLocaleTimeString()}</div></div></div>`;
    }
    return html;
  }
  function appendMessage(msg, isOwn) {
    const container = document.getElementById('chatMessagesList');
    if (!container) return;
    const div = document.createElement('div');
    div.className = `message-row ${isOwn ? 'own' : ''}`;
    div.innerHTML = `<div class="message-bubble">${escapeHtml(msg.text)}<div class="text-muted" style="font-size:10px">${new Date().toLocaleTimeString()}</div></div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  async function openGroupChat(groupId, name) {
    socket.emit('join_group', groupId);
    const messages = await api('GET', `/api/groups/${groupId}/messages`);
    let html = `<div class="flex between"><button id="backBtn">← Назад</button><h3>${escapeHtml(name)}</h3><button id="groupInfoBtn">ℹ️</button></div>
      <div class="messages-list" id="groupMessagesList">${renderGroupMessages(messages)}</div>
      <div class="flex" style="margin-top:12px"><input type="text" id="groupMsgInput" placeholder="Сообщение..." style="flex:1"><button id="sendGroupMsgBtn">📨</button></div>`;
    document.getElementById('app').innerHTML = html;
    document.getElementById('backBtn').onclick = () => loadChatsList();
    document.getElementById('sendGroupMsgBtn').onclick = () => {
      const text = document.getElementById('groupMsgInput').value;
      if (text.trim()) {
        socket.emit('group_message', { groupId, text });
        document.getElementById('groupMsgInput').value = '';
      }
    };
    socket.on('group_message', (msg) => {
      if (msg.groupId === groupId) appendGroupMessage(msg);
    });
  }
  function renderGroupMessages(msgs) {
    let html = '';
    for (let m of msgs) {
      const isOwn = m.userId === currentUser.id;
      html += `<div class="message-row ${isOwn ? 'own' : ''}"><div class="message-bubble"><b>${escapeHtml(m.name)}</b><br>${escapeHtml(m.text)}<div class="text-muted" style="font-size:10px">${new Date(m.time).toLocaleTimeString()}</div></div></div>`;
    }
    return html;
  }
  function appendGroupMessage(msg) {
    const container = document.getElementById('groupMessagesList');
    if (!container) return;
    const isOwn = msg.userId === currentUser.id;
    const div = document.createElement('div');
    div.className = `message-row ${isOwn ? 'own' : ''}`;
    div.innerHTML = `<div class="message-bubble"><b>${escapeHtml(msg.name)}</b><br>${escapeHtml(msg.text)}<div class="text-muted" style="font-size:10px">${new Date().toLocaleTimeString()}</div></div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function showCreateGroupModal() {
    const modalHtml = `
      <div class="modal" id="groupModal">
        <div class="modal-content">
          <h3>Создать группу</h3>
          <input id="groupName" placeholder="Название группы">
          <select id="groupType">
            <option value="open">Открытая (все могут войти)</option>
            <option value="closed">Закрытая (заявки)</option>
            <option value="channel">Канал (только админы пишут)</option>
            <option value="custom">Кастом (пока базовый)</option>
          </select>
          <input type="file" id="groupAvatar" accept="image/*">
          <div class="flex between">
            <button id="createGroupBtn">Создать</button>
            <button id="cancelGroupBtn" class="secondary">Отмена</button>
          </div>
        </div>
      </div>
    `;
    document.body.insertAdjacentHTML('beforeend', modalHtml);
    document.getElementById('createGroupBtn').onclick = async () => {
      const name = document.getElementById('groupName').value;
      const type = document.getElementById('groupType').value;
      const file = document.getElementById('groupAvatar').files[0];
      const fd = new FormData();
      fd.append('name', name);
      fd.append('type', type);
      if (file) fd.append('avatar', file);
      await fetch('/api/groups', { method: 'POST', headers: { 'Authorization': `Bearer ${token}` }, body: fd });
      document.getElementById('groupModal')?.remove();
      loadChatsList();
    };
    document.getElementById('cancelGroupBtn').onclick = () => document.getElementById('groupModal')?.remove();
  }

  // ----- ПРОФИЛЬ (как в Telegram) -----
  async function renderProfile() {
    const user = await api('GET', '/api/me');
    currentUser = user;
    let html = `
      <div class="card col" style="align-items: center;">
        <img class="avatar" style="width:100px; height:100px" src="${user.avatar || 'https://randomuser.me/api/portraits/lego/1.jpg'}">
        <h2>${escapeHtml(user.name)}</h2>
        <div class="text-muted">@${escapeHtml(user.username)}</div>
        <button id="editProfileBtn" class="secondary">✏️ Редактировать</button>
      </div>
      <div class="card">
        <h3>О себе</h3>
        <p>Пока пусто, но скоро добавим</p>
      </div>
    `;
    document.getElementById('app').innerHTML = html;
    document.getElementById('editProfileBtn')?.addEventListener('click', () => {
      const newName = prompt('Новое имя:', user.name);
      if (newName && newName !== user.name) {
        api('PUT', '/api/profile', { name: newName }).then(() => renderProfile());
      }
    });
  }

  // ----- УПРАВЛЕНИЕ ВКЛАДКАМИ -----
  async function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(btn => {
      if (btn.dataset.tab === tab) btn.classList.add('active');
      else btn.classList.remove('active');
    });
    if (tab === 'feed') await renderFeed();
    if (tab === 'chats') await loadChatsList();
    if (tab === 'profile') await renderProfile();
  }

  // ----- АВТОРИЗАЦИЯ -----
  async function checkAuth() {
    if (!token) {
      showLoginScreen();
      return;
    }
    try {
      const res = await fetch('/api/me', { headers: { 'Authorization': `Bearer ${token}` } });
      if (!res.ok) throw new Error();
      currentUser = await res.json();
      document.getElementById('bottomTabs').style.display = 'flex';
      initSocket();
      switchTab('feed');
    } catch {
      token = null;
      localStorage.removeItem('token');
      showLoginScreen();
    }
  }

  function showLoginScreen() {
    document.getElementById('bottomTabs').style.display = 'none';
    document.getElementById('app').innerHTML = `
      <div class="card" style="text-align:center; margin-top:40px">
        <h1>Shift</h1>
        <input id="loginLogin" placeholder="Логин">
        <input id="loginPass" type="password" placeholder="Пароль">
        <button id="doLogin">Войти</button>
        <button id="doReg" class="secondary">Регистрация</button>
      </div>
    `;
    document.getElementById('doLogin').onclick = async () => {
      const login = document.getElementById('loginLogin').value;
      const pass = document.getElementById('loginPass').value;
      const res = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ login, password: pass }) });
      const data = await res.json();
      if (data.token) {
        token = data.token;
        localStorage.setItem('token', token);
        checkAuth();
      } else alert('Ошибка входа');
    };
    document.getElementById('doReg').onclick = () => {
      document.getElementById('app').innerHTML = `
        <div class="card">
          <input id="regName" placeholder="Имя">
          <input id="regUsername" placeholder="Username">
          <input id="regLogin" placeholder="Логин">
          <input id="regPass" type="password" placeholder="Пароль">
          <button id="doRegister">Зарегистрироваться</button>
        </div>
      `;
      document.getElementById('doRegister').onclick = async () => {
        const name = document.getElementById('regName').value;
        const username = document.getElementById('regUsername').value;
        const login = document.getElementById('regLogin').value;
        const password = document.getElementById('regPass').value;
        const res = await fetch('/api/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, username, login, password }) });
        const data = await res.json();
        if (data.token) {
          token = data.token;
          localStorage.setItem('token', token);
          checkAuth();
        } else alert('Ошибка регистрации');
      };
    };
  }

  function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

  // Старт
  window.addEventListener('load', () => {
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => switchTab(btn.dataset.tab));
    });
    checkAuth();
  });
</script>
</body>
</html>
